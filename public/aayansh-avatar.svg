<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Background circle -->
  <circle cx="100" cy="100" r="96" fill="#E8F5E9" stroke="#2E7D32" stroke-width="3"/>

  <!-- Hair -->
  <ellipse cx="100" cy="72" rx="52" ry="45" fill="#1A1A2E"/>
  <ellipse cx="100" cy="58" rx="48" ry="32" fill="#1A1A2E"/>
  <!-- Spiky hair bits -->
  <path d="M60 55 Q55 35 65 45" fill="#1A1A2E"/>
  <path d="M80 45 Q78 25 88 38" fill="#1A1A2E"/>
  <path d="M100 42 Q100 22 108 36" fill="#1A1A2E"/>
  <path d="M118 45 Q122 25 126 40" fill="#1A1A2E"/>
  <path d="M135 55 Q142 38 138 50" fill="#1A1A2E"/>

  <!-- Face -->
  <ellipse cx="100" cy="95" rx="44" ry="48" fill="#F5D0A9"/>

  <!-- Ears -->
  <ellipse cx="56" cy="95" rx="8" ry="12" fill="#F5D0A9"/>
  <ellipse cx="56" cy="95" rx="5" ry="8" fill="#EDBA8A"/>
  <ellipse cx="144" cy="95" rx="8" ry="12" fill="#F5D0A9"/>
  <ellipse cx="144" cy="95" rx="5" ry="8" fill="#EDBA8A"/>

  <!-- Glasses frames -->
  <rect x="64" y="82" width="30" height="24" rx="12" ry="12" fill="none" stroke="#333" stroke-width="3"/>
  <rect x="106" y="82" width="30" height="24" rx="12" ry="12" fill="none" stroke="#333" stroke-width="3"/>
  <!-- Bridge -->
  <line x1="94" y1="94" x2="106" y2="94" stroke="#333" stroke-width="2.5"/>
  <!-- Temple arms -->
  <line x1="64" y1="90" x2="56" y2="88" stroke="#333" stroke-width="2.5"/>
  <line x1="136" y1="90" x2="144" y2="88" stroke="#333" stroke-width="2.5"/>

  <!-- Glasses lenses (slight tint) -->
  <rect x="64" y="82" width="30" height="24" rx="12" ry="12" fill="rgba(200,220,255,0.15)"/>
  <rect x="106" y="82" width="30" height="24" rx="12" ry="12" fill="rgba(200,220,255,0.15)"/>

  <!-- Eyes -->
  <circle cx="79" cy="94" r="5" fill="#1A1A2E"/>
  <circle cx="121" cy="94" r="5" fill="#1A1A2E"/>
  <!-- Eye shine -->
  <circle cx="81" cy="92" r="2" fill="white"/>
  <circle cx="123" cy="92" r="2" fill="white"/>

  <!-- Eyebrows -->
  <path d="M67 78 Q79 72 91 78" stroke="#1A1A2E" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <path d="M109 78 Q121 72 133 78" stroke="#1A1A2E" stroke-width="2.5" fill="none" stroke-linecap="round"/>

  <!-- Nose -->
  <path d="M97 100 Q100 108 103 100" stroke="#D4A574" stroke-width="2" fill="none" stroke-linecap="round"/>

  <!-- Big smile -->
  <path d="M80 115 Q100 132 120 115" stroke="#C0392B" stroke-width="2.5" fill="#E74C3C" stroke-linecap="round"/>
  <!-- Teeth -->
  <rect x="91" y="115" width="18" height="8" rx="2" fill="white"/>

  <!-- Cheek blush -->
  <ellipse cx="68" cy="110" rx="8" ry="5" fill="rgba(255,150,150,0.3)"/>
  <ellipse cx="132" cy="110" rx="8" ry="5" fill="rgba(255,150,150,0.3)"/>

  <!-- Shirt collar / neck -->
  <rect x="82" y="138" width="36" height="12" rx="4" fill="#F5D0A9"/>

  <!-- Cricket shirt (visible at bottom) -->
  <path d="M58 150 Q60 142 82 140 L118 140 Q140 142 142 150 L148 175 Q100 185 52 175 Z" fill="#1565C0"/>
  <!-- Shirt collar detail -->
  <path d="M85 140 L100 152 L115 140" stroke="white" stroke-width="2" fill="none"/>

  <!-- Cricket ball in hand (bowling action hint) -->
  <circle cx="155" cy="130" r="12" fill="#C0392B"/>
  <!-- Ball seam -->
  <path d="M148 124 Q155 130 148 136" stroke="#FFD54F" stroke-width="1.5" fill="none"/>
  <path d="M162 124 Q155 130 162 136" stroke="#FFD54F" stroke-width="1.5" fill="none"/>
  <!-- Seam stitches -->
  <line x1="147" y1="126" x2="149" y2="127" stroke="#FFD54F" stroke-width="1"/>
  <line x1="147" y1="130" x2="149" y2="130" stroke="#FFD54F" stroke-width="1"/>
  <line x1="147" y1="134" x2="149" y2="133" stroke="#FFD54F" stroke-width="1"/>
  <line x1="161" y1="126" x2="159" y2="127" stroke="#FFD54F" stroke-width="1"/>
  <line x1="161" y1="130" x2="159" y2="130" stroke="#FFD54F" stroke-width="1"/>
  <line x1="161" y1="134" x2="159" y2="133" stroke="#FFD54F" stroke-width="1"/>

  <!-- Hand holding ball -->
  <path d="M148 125 Q142 128 143 135 Q144 140 150 138 Q148 136 148 130 Z" fill="#F5D0A9"/>
</svg>
